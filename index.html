<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Prevent browser from sleeping/hibernating -->
  <meta http-equiv="ScreenOrientation" content="autoRotate:disabled">
  
  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d1117">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <title>Pulsetto Web Controller</title>
  <link rel="stylesheet" href="style.css">
  
  <!-- Prevent idle on some browsers -->
  <script>
    // Early anti-idle setup
    window.addEventListener('beforeunload', (e) => {
      if (window.__pulsettoSessionActive) {
        e.preventDefault();
        e.returnValue = 'Session is active';
      }
    });
  </script>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <h1>Pulsetto</h1>
      <div class="status-bar">
        <span id="connection-status" class="status-dot disconnected"></span>
        <span id="status-text">Disconnected</span>
        <span id="battery-level" class="battery hidden">--%</span>
        <span id="charging-indicator" class="charging hidden">⚡</span>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main">
      <!-- Top Row: Connection + Device Info -->
      <section id="connection-panel" class="panel panel-compact">
        <div class="connection-row">
          <button id="btn-scan" class="btn btn-primary">Scan for Device</button>
          <button id="btn-disconnect" class="btn btn-secondary hidden">Disconnect</button>
          <div id="device-info" class="device-info hidden">
            <span id="device-name">--</span>
            <span id="device-id" class="device-id">--</span>
          </div>
        </div>
      </section>

      <!-- Session Timeline (shows when session active) -->
      <section id="timeline-panel" class="panel hidden">
        <div id="timeline-root"></div>
      </section>

      <!-- Controls Grid -->
      <section id="session-panel" class="panel">
        <!-- Top Row: Mode + Description -->
        <div class="controls-row">
          <div class="mode-selector">
            <label>Mode</label>
            <select id="mode-select" disabled>
              <option value="sleep" selected>Sleep</option>
              <option value="stress">Stress Relief</option>
              <option value="focus">Focus (left)</option>
              <option value="focus_r">Focus (right)</option>
              <option value="pain">Pain Relief</option>
              <option value="calm">Calm</option>
              <option value="headache">Headache</option>
              <option value="nausea">Nausea</option>
              <option value="meditation">Meditation</option>
            </select>
          </div>
          <div id="mode-description" class="mode-description compact">
            <p class="mode-summary">--</p>
            <div class="mode-details">
              <span class="mode-detail" id="mode-channel">--</span>
              <span class="mode-detail" id="mode-pattern">--</span>
              <span class="mode-detail" id="mode-timing">--</span>
            </div>
          </div>
        </div>

        <!-- Second Row: Channel + Intensity + Fade (side by side on desktop) -->
        <div class="controls-row controls-row-3col">
          <!-- Channel Override -->
          <div class="channel-override compact">
            <label>Channel</label>
            <div class="channel-buttons">
              <button id="channel-left" class="btn-channel" data-channel="left">Left</button>
              <button id="channel-right" class="btn-channel" data-channel="right">Right</button>
              <button id="channel-both" class="btn-channel active" data-channel="bilateral">Both</button>
            </div>
          </div>

          <!-- Intensity -->
          <div class="intensity-section compact">
            <label>Intensity <span id="intensity-value" class="intensity-badge">8</span></label>
            <div class="intensity-control">
              <input type="range" id="intensity-slider" min="0" max="9" value="8" disabled>
              <div class="intensity-scale">
                <span>0</span><span>9</span>
              </div>
            </div>
          </div>

          <!-- Fade Control -->
          <div class="fade-control compact">
            <label>Fade</label>
            <select id="fade-select" class="fade-select" disabled>
              <option value="off">Off</option>
              <option value="in">Fade In</option>
              <option value="out">Fade Out</option>
              <option value="pulse">Pulse</option>
            </select>
          </div>
        </div>

        <!-- Timer Row -->
        <div class="timer-row">
          <button id="btn-timer-down" class="btn-icon" disabled>−</button>
          <span id="timer-value" class="timer-value">10:00</span>
          <input type="range" id="timer-slider" min="1" max="60" value="10" disabled class="timer-slider-inline">
          <button id="btn-timer-up" class="btn-icon" disabled>+</button>
        </div>

        <!-- Breathing Guide (for respiratory-gated modes) -->
        <div id="breathing-guide" class="breathing-guide compact hidden">
          <div class="breathing-circle" id="breathing-circle"></div>
          <div class="breathing-text" id="breathing-text">Inhale</div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
          <button id="btn-start" class="btn btn-action btn-start" disabled>Start</button>
          <button id="btn-pause" class="btn btn-action btn-pause hidden" disabled>Pause</button>
          <button id="btn-resume" class="btn btn-action btn-resume hidden" disabled>Resume</button>
          <button id="btn-stop" class="btn btn-action btn-stop hidden" disabled>Stop</button>
        </div>

        <!-- Session Progress -->
        <div id="session-progress" class="session-progress hidden">
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
          </div>
          <div class="progress-info">
            <span id="elapsed-time">00:00</span>
            <span id="remaining-time">10:00</span>
          </div>
        </div>
      </section>

      <!-- Logs (collapsible, compact) -->
      <section class="panel panel-logs">
        <details open>
          <summary>Logs</summary>
          <div class="log-toolbar">
            <button id="btn-clear-logs" class="btn btn-small">Clear</button>
            <button id="btn-auto-scroll" class="btn btn-small active" title="Auto-scroll">⬇</button>
            <button id="btn-expand-logs" class="btn btn-small" title="Expand logs">⛶</button>
          </div>
          <div id="log-container" class="log-container"></div>
        </details>
      </section>
    </main>

  </div>

  <!-- Protocol (ASCII - confirmed in official app v2.2.91) -->
  <script src="js/protocol.js"></script>
  <script src="js/bluetooth.js"></script>

  <!-- Session & UI -->
  <script src="js/session-clock.js"></script>
  <script src="js/background-keepalive.js"></script>
  <script src="js/mode-engines.js"></script>
  <script src="js/timeline-script.js"></script>
  <script src="js/timeline.js"></script>
  <script src="js/app.js"></script>
  
  <script>
    // Service Worker registration for PWA capabilities
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch((err) => {
        // SSL certificate errors are expected with self-signed certs
        // Service worker is optional for local development
        if (err.message?.includes('SSL') || err.message?.includes('certificate')) {
          console.log('[SW] Registration skipped: SSL certificate error (expected with self-signed cert)');
        } else {
          console.warn('[SW] Registration failed:', err);
        }
      });
    }
  </script>
</body>
</html>
